        const App = () => {
            const [filterTime, setFilterTime] = useState(new Date());
            const [data, setData] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [error, setError] = useState('');
            
            // Navegación

            // Suspensión (Modo Institucional)

            const suspensionScrollRef = useRef(null);

            // Encuestas y Modales
            const [surveys, setSurveys] = useState([]);
            const [showSurveyModal, setShowSurveyModal] = useState(false);
            const [surveyData, setSurveyData] = useState({ rating: 0, comment: '', name: '', email: '' });
            const [surveyStep, setSurveyStep] = useState(1);
            
            const [showQrModal, setShowQrModal] = useState(false);
            const [qrUrl, setQrUrl] = useState(window.location.href);

            // Seguridad Unificada y Kiosco
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordAction, setPasswordAction] = useState(null);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState(false);
            const authorizedFullscreenExit = useRef(false);
            const [kioskLocked, setKioskLocked] = useState(false);
            
            // UI y Correos
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [metrics, setMetrics] = useState({ clicks: 0, filters: 0, buttons: 0 });
            const [sessionId] = useState(() => { try { let s = sessionStorage.getItem('totem_sid'); if (!s) { s = Date.now().toString(36) + Math.random().toString(36).slice(2, 8); sessionStorage.setItem('totem_sid', s); } return s; } catch(e) { return Date.now().toString(36); } });
            const metricsRef = useRef({ clicks: 0, filters: 0, buttons: 0 });
            const metricsSyncTimer = useRef(null);
            const searchLogTimer = useRef(null);
            const [isConnecting, setIsConnecting] = useState(!!window._sb);
            const [usuariosActivos, setUsuariosActivos] = useState(0);
            const [presenciaDetalle, setPresenciaDetalle] = useState({});
            const presenceChannelRef = useRef(null);
            const recentLocalSurveyRef = useRef(false);
            const realtimeChannelsRef = useRef([]);
            const [emailModal, setEmailModal] = useState({ show: false, target: '', status: 'idle', errorMsg: '' });
            const [analytics, setAnalytics] = useState({ loaded: false, totals: { interacciones: 0, clicks: 0, filtros: 0, botones: 0, sesiones: 0, eventos: 0 }, porDia: {}, porTipo: {} });
            const [periodo, setPeriodo] = useState('dia');
            const [adminPin, setAdminPin] = useState('010203');
            const [pinChange, setPinChange] = useState({ current: '', next: '', confirm: '', status: 'idle', msg: '' });

            const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const todayName = diasSemana[filterTime.getDay()];

            const [activeDia, setActiveDia] = useState(todayName === 'Domingo' ? 'Lunes' : todayName);
            const [selectedJornada, setSelectedJornada] = useState('');
            const [selectedEscuela, setSelectedEscuela] = useState('');
            const [selectedSigla, setSelectedSigla] = useState(''); 
            const [searchTerm, setSearchTerm] = useState('');
            const [activeFilter, setActiveFilter] = useState('ALL'); 
            
            const [availableJornadas, setAvailableJornadas] = useState([]);
            const [availableEscuelas, setAvailableEscuelas] = useState([]);
            const [availableSiglas, setAvailableSiglas] = useState([]); 

            const safeStorage = {
                getItem: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
                setItem: (key, value) => { try { localStorage.setItem(key, value); } catch(e) { console.warn("Storage bloqueado"); } }
            };

            const scheduleMetricsSync = () => {
                if (!window._sb) return;
                clearTimeout(metricsSyncTimer.current);
                metricsSyncTimer.current = setTimeout(() => {
                    const m = metricsRef.current;
                    window._sb.from('totem_metricas').upsert(
                        { session_id: sessionId, clicks: m.clicks, filters: m.filters, buttons: m.buttons, updated_at: new Date().toISOString() },
                        { onConflict: 'session_id' }
                    ).then(() => {}).catch(() => {});
                }, 8000);
            };

            const trackAction = (type) => {
                setMetrics(prev => {
                    const next = { ...prev, [type]: prev[type] + 1 };
                    safeStorage.setItem('totem_metrics', JSON.stringify(next));
                    metricsRef.current = next;
                    return next;
                });
                scheduleMetricsSync();
            };

            const logEvento = (tipo, detalle) => {
                if (!window._sb) return;
                const payload = { session_id: sessionId, tipo };
                if (detalle && Object.keys(detalle).length > 0) payload.detalle = detalle;
                window._sb.from('totem_eventos').insert(payload).then(() => {}).catch(() => {});
            };

            const cargarAnaliticas = async () => {
                if (!window._sb) return;
                try {
                    const [mRes, eRes] = await Promise.all([
                        window._sb.from('totem_metricas').select('clicks,filters,buttons,created_at').limit(20000),
                        window._sb.from('totem_eventos').select('tipo,created_at').limit(50000)
                    ]);
                    const mRows = mRes.data || [];
                    const eRows = eRes.data || [];
                    const dayMap = {};
                    let tC = 0, tF = 0, tB = 0, tS = 0;
                    mRows.forEach(r => {
                        const k = (r.created_at || '').slice(0, 10);
                        if (!k) return;
                        const c = r.clicks || 0, f = r.filters || 0, b = r.buttons || 0;
                        if (!dayMap[k]) dayMap[k] = { interacciones: 0, clicks: 0, filtros: 0, botones: 0, sesiones: 0 };
                        dayMap[k].interacciones += c + f + b;
                        dayMap[k].clicks += c; dayMap[k].filtros += f; dayMap[k].botones += b; dayMap[k].sesiones += 1;
                        tC += c; tF += f; tB += b; tS += 1;
                    });
                    const porTipo = {};
                    eRows.forEach(r => { if (r.tipo) porTipo[r.tipo] = (porTipo[r.tipo] || 0) + 1; });
                    setAnalytics({
                        loaded: true,
                        totals: { interacciones: tC + tF + tB, clicks: tC, filtros: tF, botones: tB, sesiones: tS, eventos: eRows.length },
                        porDia: dayMap,
                        porTipo: porTipo
                    });
                } catch (e) { /* offline: se mantiene el estado previo */ }
            };

            const analyticsBuckets = useMemo(() => {
                const dm = analytics.porDia || {};
                const hoy = new Date();
                const fmt = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                const out = [];
                if (periodo === 'dia') {
                    for (let i = 13; i >= 0; i--) {
                        const d = new Date(hoy); d.setDate(d.getDate() - i);
                        const v = dm[fmt(d)];
                        out.push({ label: d.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' }), interacciones: v ? v.interacciones : 0 });
                    }
                } else if (periodo === 'semana') {
                    for (let w = 7; w >= 0; w--) {
                        const start = new Date(hoy); start.setDate(start.getDate() - w * 7 - ((start.getDay() + 6) % 7));
                        let sum = 0;
                        for (let dd = 0; dd < 7; dd++) { const d = new Date(start); d.setDate(d.getDate() + dd); const v = dm[fmt(d)]; if (v) sum += v.interacciones; }
                        out.push({ label: start.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' }), interacciones: sum });
                    }
                } else {
                    for (let m = 5; m >= 0; m--) {
                        const d = new Date(hoy.getFullYear(), hoy.getMonth() - m, 1);
                        const ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                        let sum = 0;
                        Object.keys(dm).forEach(k => { if (k.slice(0, 7) === ym) sum += dm[k].interacciones; });
                        out.push({ label: d.toLocaleDateString('es-CL', { month: 'short' }), interacciones: sum });
                    }
                }
                return out;
            }, [analytics, periodo]);
            const bucketMax = Math.max(1, ...analyticsBuckets.map(b => b.interacciones));
            const eventosOrdenados = useMemo(() => Object.entries(analytics.porTipo || {}).sort((a, b) => b[1] - a[1]), [analytics]);
            const eventosMax = Math.max(1, ...eventosOrdenados.map(e => e[1]));

            // Efectos Iniciales
            useEffect(() => {
                const initMetrics = { clicks: 0, filters: 0, buttons: 0 };
                setMetrics(initMetrics);
                metricsRef.current = initMetrics;

                const handleUserClick = () => {
                    setMetrics(prev => {
                        const next = { ...prev, clicks: prev.clicks + 1 };
                        safeStorage.setItem('totem_metrics', JSON.stringify(next));
                        metricsRef.current = next;
                        return next;
                    });
                    scheduleMetricsSync();
                    setShowSuspension(false); // Despertar
                };
                window.addEventListener('click', handleUserClick);
                window.addEventListener('touchstart', handleUserClick);
                
                return () => {
                    window.removeEventListener('click', handleUserClick);
                    window.removeEventListener('touchstart', handleUserClick);
                };
            }, []);

            useEffect(() => {
                let timeout;
                const checkInactivity = () => {
                    timeout = setTimeout(() => {
                        // Solo suspender en desktop si está inactivo
                        if (window.innerWidth >= 1024 && !showPasswordModal && !showSurveyModal && !showQrModal && !emailModal.show && !kioskLocked && activeTab === 'CARTELERA') {
                            setShowSuspension(true);
                        }

                        // Limpiar Filtros
                        const realTimeDayName = diasSemana[new Date().getDay()];
                        setActiveDia(realTimeDayName === 'Domingo' ? 'Lunes' : realTimeDayName);
                        setSelectedJornada('');
                        setSelectedEscuela('');
                        setSelectedSigla('');
                        setSearchTerm('');
                        setActiveFilter('ALL');

                        // Cerrar modales
                        if (activeTab === 'ADMIN') {
                            setActiveTab('CARTELERA');
                            setAdminSubTab('DASHBOARD');
                        }
                        setShowPasswordModal(false);
                        setShowSurveyModal(false);
                        setShowQrModal(false);
                        setEmailModal({ show: false, target: '', status: 'idle', errorMsg: '' });
                        setPasswordInput('');
                    }, 30000); // 30 Segundos
                };

                checkInactivity();
                
                const resetTimer = () => {
                    clearTimeout(timeout);
                    setShowSuspension(false);
                    checkInactivity();
                };

                window.addEventListener('mousemove', resetTimer);
                window.addEventListener('keypress', resetTimer);
                window.addEventListener('touchstart', resetTimer);
                window.addEventListener('click', resetTimer);

                return () => {
                    clearTimeout(timeout);
                    window.removeEventListener('mousemove', resetTimer);
                    window.removeEventListener('keypress', resetTimer);
                    window.removeEventListener('touchstart', resetTimer);
                    window.removeEventListener('click', resetTimer);
                };
            }, [activeTab, showPasswordModal, showSurveyModal, showQrModal, emailModal.show, kioskLocked]);

            useEffect(() => {
                let scrollInterval;
                if (showSuspension && suspensionScrollRef.current && window.innerWidth >= 1024) {
                    const container = suspensionScrollRef.current;
                    let scrollDown = true;
                    
                    scrollInterval = setInterval(() => {
                        if (scrollDown) {
                            container.scrollTop += 1.5;
                            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 5) {
                                scrollDown = false;
                                setTimeout(() => {}, 2000);
                            }
                        } else {
                            container.scrollTop -= 5;
                            if (container.scrollTop <= 0) scrollDown = true;
                        }
                    }, 50);
                }
                return () => clearInterval(scrollInterval);
            }, [showSuspension]);

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    safeStorage.setItem('totem_theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    safeStorage.setItem('totem_theme', 'light');
                }
            }, [isDarkMode]);

            useEffect(() => {
                const savedTheme = safeStorage.getItem('totem_theme');
                if (savedTheme === 'dark') setIsDarkMode(true);
                
                const filterTimer = setInterval(() => setFilterTime(new Date()), 1000); 
                return () => clearInterval(filterTimer);
            }, []);

            useEffect(() => {
                const applyData = (rows) => {
                    setData(rows);
                    setAvailableEscuelas([...new Set(rows.map(i => i.escuela).filter(Boolean))].sort());
                    setAvailableJornadas([...new Set(rows.map(i => i.jornada).filter(Boolean))].sort());
                    setAvailableSiglas([...new Set(rows.map(i => i.seccion).filter(Boolean))].sort());
                    setIsLoaded(true);
                };

                const init = async () => {

            const formatExcelTime = (val) => {
                if (val == null || val === '') return "00:00";
                const strVal = String(val).trim();
                const timeMatch = strVal.match(/^(\d{1,2}):(\d{2})/);
                if (timeMatch) return `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;
                const numVal = Number(strVal);
                if (!isNaN(numVal) && numVal > 0 && numVal < 1) {
                    const totalMinutes = Math.round(numVal * 24 * 60);
                    const h = Math.floor(totalMinutes / 60);
                    const m = totalMinutes % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }
                return "00:00";
            };

            const parseSala = (salaRaw) => {

            };

                reader.onload = (evt) => {

                        const workbook = window.XLSX.read(dataBuffer, { type: 'array', raw: false });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        processData(json);
                    } catch (err) {
                        console.error(err);
                        setError('Error al leer el archivo. Asegúrate de que sea la sábana correcta (.xlsx)');
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const processData = (rows) => {
                if (rows.length < 2) { setError('El archivo parece estar vacío.'); return; }
                const dataRows = rows.slice(1);
                const diasMapa = { 41: 'Lunes', 42: 'Martes', 43: 'Miércoles', 44: 'Jueves', 45: 'Viernes', 46: 'Sábado' };
                const processed = [];

                dataRows.forEach(row => {
                    Object.entries(diasMapa).forEach(([colIdx, nombreDia]) => {
                        if (String(row[colIdx] || '').trim().toUpperCase() === 'X') {
                            processed.push({
                                escuela: String(row[8] || '').trim(),
                                jornada: String(row[10] || '').trim(),
                                seccion: String(row[13] || '').trim(),
                                asignatura: String(row[22] || '').trim(),
                                docente: String(row[34] || '').trim(),
                                sala: parseSala(String(row[36] || '')),
                                horaInicio: formatExcelTime(row[39]),
                                horaFin: formatExcelTime(row[40]),
                                alumnos: String(row[54] || '0').trim(),
                                dia: nombreDia
                            });
                        }
                    });
                });

                const datosValidos = processed.filter(item => item.asignatura && item.horaInicio !== '00:00');
                if (datosValidos.length === 0) { setError('No se encontraron clases válidas. Verifica la estructura.'); return; }

                setData(datosValidos);
                setAvailableEscuelas([...new Set(datosValidos.map(i => i.escuela).filter(Boolean))].sort());
                setAvailableJornadas([...new Set(datosValidos.map(i => i.jornada).filter(Boolean))].sort());
                setAvailableSiglas([...new Set(datosValidos.map(i => i.seccion).filter(Boolean))].sort());

                safeStorage.setItem('totem_last_updated', new Date().toLocaleString('es-CL'));
            };

            const getClaseStatus = (clase) => {
                if (clase.dia !== todayName) return { texto: 'PROGRAMADA', bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };

                const currentMins = filterTime.getHours() * 60 + filterTime.getMinutes();
                const [sh, sm] = clase.horaInicio.split(':').map(Number);
                const [eh, em] = clase.horaFin.split(':').map(Number);
                
                const startMins = (sh * 60) + (sm || 0);
                const endMins = (eh * 60) + (em || 0);

                if (isNaN(startMins) || isNaN(endMins)) return { texto: 'PROGRAMADA', bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };

                const diffStart = startMins - currentMins;
                const diffEnd = endMins - currentMins;

                if (currentMins < startMins) {
                    if (diffStart <= 30 && diffStart > 0) {
                        return { texto: '¡POR EMPEZAR!', desc: `en ${diffStart} min`, bg: 'bg-yellow-100 dark:bg-duoc-yellow/20', text: 'text-yellow-800 dark:text-duoc-yellow', border: 'border-duoc-yellow', isImportant: true };
                    }
                    return { texto: 'POR REALIZAR', bg: 'bg-blue-50 dark:bg-duoc-lightblue/20', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-blue-200 dark:border-blue-800', isImportant: false };
                } else if (currentMins >= endMins) {
                    return { texto: 'REALIZADA', bg: 'bg-slate-100 dark:bg-slate-800', text: 'text-slate-500 dark:text-slate-500', border: 'border-slate-200 dark:border-slate-700', isImportant: false };
                } else {
                    if (diffEnd <= 30 && diffEnd > 0) {
                        return { texto: '¡POR FINALIZAR!', desc: `quedan ${diffEnd} min`, bg: 'bg-blue-100 dark:bg-duoc-lightblue/30', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-duoc-lightblue', isImportant: true };
                    }
                    return { texto: 'EN CURSO', bg: 'bg-green-100 dark:bg-green-900/40', text: 'text-green-700 dark:text-green-400', border: 'border-green-500 dark:border-green-600 shadow-[0_0_15px_rgba(34,197,94,0.3)]', isImportant: true };
                }

            const sortedFilteredData = useMemo(() => {
                const filtered = data.filter(item => {
                    const statusInfo = getClaseStatus(item);
                    const matchDia = activeDia === 'Todos' || item.dia === activeDia;
                    const matchJornada = selectedJornada === '' || item.jornada === selectedJornada;
                    const matchEscuela = selectedEscuela === '' || item.escuela === selectedEscuela;
                    const matchSigla = selectedSigla === '' || item.seccion === selectedSigla;
                    const searchLower = searchTerm.toLowerCase();
                    const matchSearch = searchTerm === '' || 
                        item.asignatura.toLowerCase().includes(searchLower) ||
                        item.docente.toLowerCase().includes(searchLower) ||
                        item.seccion.toLowerCase().includes(searchLower) ||
                        item.sala.toLowerCase().includes(searchLower);
                    
                    const matchActive = 
                        activeFilter === 'ALL' ? true :
                        activeFilter === 'EN_CURSO' ? (statusInfo.texto === 'EN CURSO' || statusInfo.texto === '¡POR FINALIZAR!') :
                        activeFilter === 'POR_EMPEZAR' ? statusInfo.texto === '¡POR EMPEZAR!' :
                        activeFilter === 'POR_FINALIZAR' ? statusInfo.texto === '¡POR FINALIZAR!' : true;

                    return matchDia && matchJornada && matchEscuela && matchSigla && matchSearch && matchActive;
                });
                return [...filtered].sort((a, b) => {
                    const statusA = getClaseStatus(a);
                    const statusB = getClaseStatus(b);
                    
                    const getPriority = (status) => {
                        if (status.texto === 'EN CURSO' || status.texto === '¡POR EMPEZAR!' || status.texto === '¡POR FINALIZAR!') return 1;
                        if (status.texto === 'REALIZADA') return 3;
                        return 2; 
                    };

                    const prioA = getPriority(statusA);
                    const prioB = getPriority(statusB);

                    if (prioA !== prioB) return prioA - prioB;

                    return a.horaInicio.localeCompare(b.horaInicio);
                });

                const words = {};

                surveys.forEach(s => {
                    if(!s.comment) return;

                        if(w.length > 3 && !stopWords.includes(w)) {

                return Object.entries(words)

                                <Icons.Sun cls={`w-5 h-5 transition-colors ${!isDarkMode ? 'text-duoc-yellow' : 'text-slate-400'}`} />
                                <div className={`relative inline-flex h-7 w-12 items-center rounded-full transition-colors duration-300 focus:outline-none shadow-sm ${isDarkMode ? 'bg-duoc-yellow' : 'bg-slate-300'}`}>
                                    <span className={`inline-block h-5 w-5 transform rounded-full bg-white shadow-md transition-transform duration-300 ease-in-out ${isDarkMode ? 'translate-x-6' : 'translate-x-1'}`} />
                                </div>
                                <Icons.Moon cls={`w-4 h-4 transition-colors ${isDarkMode ? 'text-duoc-yellow' : 'text-slate-400'}`} />
                            </button>
                        </div>
                        
                        {/* BOTONES DESKTOP */}
                        <div className="hidden lg:flex items-center justify-end gap-4 overflow-x-auto custom-scrollbar flex-nowrap flex-1 min-w-0 py-1">
                            {activeTab === 'CARTELERA' && (
                                <>
                                    <button onClick={() => { setShowQrModal(true); trackAction('buttons'); logEvento('qr_abrir'); }} className="flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg hover:bg-slate-50 transition-colors shadow-sm whitespace-nowrap" title="Llevar en Celular">
                                        <Icons.QrCode cls="w-4 h-4 lg:w-5 lg:h-5" /> Versión Móvil
                                    </button>
                                    <button onClick={() => { setShowSurveyModal(true); trackAction('buttons'); logEvento('encuesta_abrir'); }} className="flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 bg-duoc-yellow text-duoc-blue rounded-lg lg:rounded-xl font-black text-sm lg:text-lg hover:bg-yellow-400 transition-colors shadow-md whitespace-nowrap" title="Evalúanos">
                                        <Icons.Star cls="w-4 h-4 lg:w-5 lg:h-5" fill="currentColor" /> ¡Evalúanos!
                                    </button>
                                    <button onClick={() => { handleExportInteractiveTotem(); trackAction('buttons'); }} className="flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 bg-duoc-lightblue/10 dark:bg-slate-800 text-duoc-lightblue dark:text-slate-300 border border-transparent dark:border-slate-700 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg hover:bg-duoc-lightblue/20 dark:hover:text-white transition-colors shadow-sm whitespace-nowrap">
                                        <Icons.Download cls="w-4 h-4 lg:w-5 lg:h-5" /> Exportar App
                                    </button>
                                </>
                            )}
                            <button onClick={() => { logEvento('pantalla_completa', {accion: document.fullscreenElement ? 'salir' : 'entrar'}); openSecurityModal(document.fullscreenElement ? 'FULLSCREEN_EXIT' : 'FULLSCREEN_ENTER'); trackAction('buttons'); }} className="flex items-center justify-center p-2 lg:p-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:text-white rounded-lg lg:rounded-xl transition-colors shadow-sm border border-transparent dark:border-slate-700 shrink-0" title="Pantalla Completa">
                                <Icons.Fullscreen cls="w-4 h-4 lg:w-5 lg:h-5" />
                            </button>
                            {activeTab === 'CARTELERA' ? (
                                <button onClick={() => { openSecurityModal('ADMIN'); trackAction('buttons'); }} className="flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg transition-all border bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-transparent dark:border-slate-700 hover:bg-slate-200 dark:hover:text-white shadow-sm whitespace-nowrap">
                                    <Icons.Settings cls="w-4 h-4 lg:w-5 lg:h-5" /> Admin
                                </button>
                            ) : (
                                <button onClick={() => { setActiveTab('CARTELERA'); setAdminSubTab('DASHBOARD'); trackAction('buttons'); }} className="flex items-center gap-1.5 lg:gap-2 px-4 py-2 lg:px-6 lg:py-3 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg transition-all border bg-duoc-blue dark:bg-slate-800 text-white dark:text-duoc-yellow border-transparent dark:border-slate-700 shadow-md hover:bg-[#004080] dark:hover:bg-slate-700 whitespace-nowrap">
                                    <Icons.LayoutList cls="w-4 h-4 lg:w-5 lg:h-5" /> Vista Estudiantes
                                </button>
                            )}
                        </div>

                        {/* BARRA NAVEGACIÓN MÓVIL */}
                        <div className="flex lg:hidden w-full gap-2">
                            {activeTab === 'CARTELERA' ? (
                                <>
                                    <button onClick={() => { setShowSurveyModal(true); trackAction('buttons'); logEvento('encuesta_abrir'); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-duoc-yellow text-duoc-blue rounded-xl font-black text-sm shadow-md active:scale-95 transition-transform">
                                        <Icons.Star cls="w-5 h-5" fill="currentColor" /> Evaluar
                                    </button>
                                    <button onClick={() => { openSecurityModal('ADMIN'); trackAction('buttons'); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-[#00274c] dark:bg-slate-800 text-white dark:text-duoc-yellow rounded-xl font-bold text-sm shadow-md active:scale-95 transition-transform border border-transparent dark:border-slate-700">
                                        <Icons.Settings cls="w-5 h-5" /> Admin
                                    </button>
                                </>
                            ) : (
                                <button onClick={() => { setActiveTab('CARTELERA'); setAdminSubTab('DASHBOARD'); trackAction('buttons'); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-duoc-blue text-white rounded-xl font-bold text-sm shadow-md active:scale-95 transition-transform">
                                    <Icons.LayoutList cls="w-5 h-5" /> Vista Estudiantes
                                </button>
                            )}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
</script>
</body>
</html>
