                    for (let i = 13; i >= 0; i--) {

                    for (let w = 7; w >= 0; w--) {
                        const start = new Date(hoy); start.setDate(start.getDate() - w * 7 - ((start.getDay() + 6) % 7));
                        let sum = 0;
                        for (let dd = 0; dd < 7; dd++) { const d = new Date(start); d.setDate(d.getDate() + dd); const v = dm[fmt(d)]; if (v) sum += v.interacciones; }
                        out.push({ label: start.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' }), interacciones: sum });
                    }

                    for (let m = 5; m >= 0; m--) {

                        const ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                        let sum = 0;
                        Object.keys(dm).forEach(k => { if (k.slice(0, 7) === ym) sum += dm[k].interacciones; });
                        out.push({ label: d.toLocaleDateString('es-CL', { month: 'short' }), interacciones: sum });

                    }
                });
                (analytics.eventos || []).forEach(e => { if (e.created_at && new Date(e.created_at) >= periodoDesde) r.eventos++; });

            }, [analytics, periodoDesde]);

                return Object.entries(porTipo).sort((a, b) => b[1] - a[1]);
            }, [analytics, periodoDesde]);
            const eventosMax = Math.max(1, ...eventosOrdenados.map(e => e[1]));

                return arr;
            }, [analytics, periodoDesde]);
            const horaMax = Math.max(1, ...horasActividad);

            const topBusquedas = useMemo(() => {

                    if (t.length >= 2) conteo[t] = (conteo[t] || 0) + 1;
                });
                return Object.entries(conteo).sort((a, b) => b[1] - a[1]).slice(0, 8);

            const periodoAnteriorDesde = useMemo(() => {

                if (periodo === 'dia') d.setDate(d.getDate() - 14);

                else d.setMonth(d.getMonth() - 6);

            const periodoAnteriorStats = useMemo(() => {

                // Realtime: nueva sábana subida desde el panel → refrescar horarios en todos los tótems
                // Escucha la tabla "señal" (diminuta) y refresca los datos pesados vía REST.
                const sabanaChannel = window._sb
                    .channel('totem_sabana_rt')
                    .on('postgres_changes',
                        { event: '*', schema: 'public', table: 'totem_sabana_signal' },
                        async () => {
                            try {
                                const { data: sab } = await window._sb
                                    .from('totem_sabana')
                                    .select('data, archivo_nombre, total_filas, actualizado_en')
                                    .eq('id', 1).maybeSingle();
                                if (sab && Array.isArray(sab.data) && sab.data.length > 0) {
                                    setData(sab.data);
                                    setAvailableEscuelas([...new Set(sab.data.map(i => i.escuela).filter(Boolean))].sort());
                                    setAvailableJornadas([...new Set(sab.data.map(i => i.jornada).filter(Boolean))].sort());
                                    setAvailableSiglas([...new Set(sab.data.map(i => i.seccion).filter(Boolean))].sort());
                                    safeStorage.setItem('totem_horarios_data', JSON.stringify(sab.data));
                                    const fechaTxt = sab.actualizado_en ? new Date(sab.actualizado_en).toLocaleString('es-CL') : '';
                                    if (fechaTxt) safeStorage.setItem('totem_last_updated', fechaTxt);
                                    if (sab.archivo_nombre) safeStorage.setItem('totem_sabana_nombre', sab.archivo_nombre);
                                    setSabanaInfo({ status: 'sync', nombre: sab.archivo_nombre || '', fecha: fechaTxt, filas: sab.total_filas || sab.data.length, descargando: false });
                                }
                            } catch (e) {}
                        }
                    )
                    .subscribe();

                // Realtime: nuevos exámenes subidos → refrescar en todos los tótems
                const examenesChannel = window._sb
                    .channel('totem_examenes_rt')
                    .on('postgres_changes',
                        { event: '*', schema: 'public', table: 'totem_examenes_signal' },
                        async () => {
                            try {
                                const { data: exRow } = await window._sb
                                    .from('totem_examenes').select('data, archivo_nombre, total_filas, actualizado_en')
                                    .eq('id', 1).maybeSingle();
                                if (exRow && Array.isArray(exRow.data) && exRow.data.length > 0) {
                                    setExamenes(exRow.data);
                                    safeStorage.setItem('totem_examenes_data', JSON.stringify(exRow.data));
                                    const fTxt = exRow.actualizado_en ? new Date(exRow.actualizado_en).toLocaleString('es-CL') : '';
                                    if (fTxt) safeStorage.setItem('totem_examenes_updated', fTxt);
                                    if (exRow.archivo_nombre) safeStorage.setItem('totem_examenes_nombre', exRow.archivo_nombre);
                                    setExamenesInfo({ status: 'sync', nombre: exRow.archivo_nombre || '', fecha: fTxt, filas: exRow.total_filas || exRow.data.length, descargando: false });
                                } else {
                                    setExamenes([]);
                                    setExamenesInfo({ status: 'idle', nombre: '', fecha: '', filas: 0, descargando: false });
                                }
                            } catch(e) {}
                        }
                    ).subscribe();

                // Realtime: cambios de configuración (vista pública / título) → aplicar en todos los tótems
                const configChannel = window._sb
                    .channel('totem_config_rt')
                    .on('postgres_changes',
                        { event: '*', schema: 'public', table: 'totem_config' },
                        async () => {
                            try {
                                const { data: cfgRows } = await window._sb
                                    .from('totem_config').select('key, value');
                                if (Array.isArray(cfgRows)) {
                                    const cfgMap = {};
                                    cfgRows.forEach(r => { if (r && r.key) cfgMap[r.key] = r.value; });
                                    if (cfgMap.admin_pin) { setAdminPin(cfgMap.admin_pin); safeStorage.setItem('totem_admin_pin', cfgMap.admin_pin); }
                                    if (cfgMap.vista_publica) { setVistaPublica(cfgMap.vista_publica); safeStorage.setItem('totem_vista_publica', cfgMap.vista_publica); }
                                    if (cfgMap.titulo_totem) { setTituloTotem(cfgMap.titulo_totem); safeStorage.setItem('totem_titulo', cfgMap.titulo_totem); }
                                    if (cfgMap.barra_info) { try { setBarraInfo(normalizarBarraInfo(JSON.parse(cfgMap.barra_info))); safeStorage.setItem('totem_barra_info', cfgMap.barra_info); } catch (e) {} }
                                    if (cfgMap.suspension_seg) { const n = parseInt(cfgMap.suspension_seg, 10); if (!isNaN(n)) { setSuspensionSeg(Math.min(1800, Math.max(10, n))); safeStorage.setItem('totem_suspension_seg', String(n)); } }
                                }
                            } catch (e) {}
                        }
                    ).subscribe();

                realtimeChannelsRef.current = [surveyChannel, sabanaChannel, examenesChannel, configChannel];

                return () => {
                    surveyChannel.unsubscribe();
                    sabanaChannel.unsubscribe();
                    examenesChannel.unsubscribe();
                    configChannel.unsubscribe();
                };
            }, [sessionId]);

            // Presencia robusta vía "heartbeat" en BD (totem_presencia).
            // Cada dispositivo marca su última señal cada 20s; el contador toma a quienes
            // tuvieron señal en los últimos 45s. No depende de cuotas de Realtime Presence.
            useEffect(() => {
                if (!window._sb) return;
                let cancelado = false;

                const enviarHeartbeat = async () => {
                    try {
                        await window._sb.from('totem_presencia').upsert(
                            { session_id: sessionId, tab: activeTab.toLowerCase(), last_seen: new Date().toISOString() },
                            { onConflict: 'session_id' }
                        );
                    } catch (e) {}
                };

                const contarActivos = async () => {
                    try {
                        const cutoff = new Date(Date.now() - 45000).toISOString();
                        const { data } = await window._sb
                            .from('totem_presencia').select('tab, last_seen').gte('last_seen', cutoff);
                        if (cancelado || !Array.isArray(data)) return;
                        setUsuariosActivos(data.length);
                        const detalle = data.reduce((acc, r) => {
                            const t = (r.tab || 'cartelera').toLowerCase();
                            acc[t] = (acc[t] || 0) + 1;
                            return acc;
                        }, {});
                        setPresenciaDetalle(detalle);
                        // Limpieza ocasional de sesiones antiguas para que la tabla no crezca
                        if (Math.random() < 0.15) {
                            window._sb.from('totem_presencia')
                                .delete().lt('last_seen', new Date(Date.now() - 120000).toISOString())
                                .then(() => {}, () => {});
                        }
                    } catch (e) {}
                };

                enviarHeartbeat();
                contarActivos();
                const hbTimer = setInterval(enviarHeartbeat, 20000);
                const countTimer = setInterval(contarActivos, 15000);

                return () => {
                    cancelado = true;
                    clearInterval(hbTimer);
                    clearInterval(countTimer);
                };
            }, [sessionId, activeTab]);

            // Mantener el borrador del título en sincronía con el valor guardado
            useEffect(() => { setTituloDraft(tituloTotem); }, [tituloTotem]);

            const formatExcelTime = (val) => {
                if (val == null || val === '') return "00:00";
                const strVal = String(val).trim();
                const timeMatch = strVal.match(/^(\d{1,2}):(\d{2})/);
                if (timeMatch) return `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;
                const numVal = Number(strVal);
                if (!isNaN(numVal) && numVal > 0) {
                    // Serial de Excel: la parte fraccionaria es la hora (ej. 0.354 o 46623.354).
                    const frac = numVal - Math.floor(numVal);
                    if (frac > 0.0000001) {
                        const totalMinutes = Math.round(frac * 24 * 60);
                        const h = Math.floor(totalMinutes / 60) % 24;
                        const m = totalMinutes % 60;
                        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    }
                }
                return "00:00";
            };

            const parseSala = (salaRaw) => {
                const limpia = salaRaw.trim().replace('VI-', '');
                return limpia === '' || limpia.toLowerCase() === 'sin sala' ? 'Sin recinto' : limpia;
            };

            const arrayBufferToBase64 = (buffer) => {
                let binary = '';
                const bytes = new Uint8Array(buffer);
                const chunk = 0x8000;
                for (let i = 0; i < bytes.length; i += chunk) {
                    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
                }
                return btoa(binary);
            };

            const base64ToBlob = (base64, mime) => {
                const byteChars = atob(base64);
                const byteNumbers = new Array(byteChars.length);
                for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
                return new Blob([new Uint8Array(byteNumbers)], { type: mime });
            };

            const subirSabana = async (datos, base64, nombre) => {
                const ahora = new Date();
                const fechaTxt = ahora.toLocaleString('es-CL');
                safeStorage.setItem('totem_horarios_data', JSON.stringify(datos));
                safeStorage.setItem('totem_last_updated', fechaTxt);
                safeStorage.setItem('totem_sabana_nombre', nombre);
                if (!window._sb) {
                    setSabanaInfo({ status: 'local', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                    return;
                }
                setSabanaInfo({ status: 'subiendo', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                try {
                    const { error } = await window._sb.from('totem_sabana').upsert({
                        id: 1,
                        data: datos,
                        archivo_base64: base64,
                        archivo_nombre: nombre,
                        total_filas: datos.length,
                        actualizado_en: ahora.toISOString()
                    }, { onConflict: 'id' });
                    if (error) throw error;
                    // Señal liviana para que todos los tótems abiertos refresquen al instante
                    await window._sb.from('totem_sabana_signal').upsert(
                        { id: 1, version: ahora.toISOString() }, { onConflict: 'id' }
                    ).then(() => {}, () => {});
                    logEvento('admin_sabana_sync', { filas: datos.length, archivo: nombre });
                    setSabanaInfo({ status: 'sync', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                } catch (err) {
                    console.error('Error subiendo sábana a Supabase:', err);
                    setSabanaInfo({ status: 'error', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                }
            };

            const descargarSabana = async () => {
                setSabanaInfo(p => ({ ...p, descargando: true }));
                try {
                    if (!window._sb) throw new Error('sin conexión');
                    const { data, error } = await window._sb
                        .from('totem_sabana').select('archivo_base64, archivo_nombre').eq('id', 1).maybeSingle();
                    if (error || !data || !data.archivo_base64) {
                        alert('Aún no hay una sábana almacenada en el servidor para descargar. Sube una primero.');
                        return;
                    }
                    const nombre = data.archivo_nombre || 'sabana_planificacion.xlsx';
                    const blob = base64ToBlob(data.archivo_base64, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = nombre;
                    document.body.appendChild(a); a.click(); a.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 150);
                    logEvento('admin_sabana_descarga', { archivo: nombre });
                } catch (err) {
                    console.error('Error descargando sábana:', err);
                    alert('No se pudo descargar la sábana. Revisa la conexión e intenta de nuevo.');
                } finally {
                    setSabanaInfo(p => ({ ...p, descargando: false }));
                }
            };

            const processExamenes = (rows) => {
                if (rows.length < 2) return null;
                // Elimina bytes NUL y caracteres de control (excepto tab/salto de línea) que Postgres
                // rechaza al guardar en jsonb. Vienen a veces en Excel exportados de otros sistemas.
                const limpiarTexto = (s) => String(s).replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, '').trim();
                const rawHeaders = rows[0];
                const headers = rawHeaders.map((h, _i) => limpiarTexto(h)
                    .toLowerCase()
                    .replace(/\s+/g, '_')
                    .replace(/[áàä]/g, 'a').replace(/[éèë]/g, 'e').replace(/[íìï]/g, 'i').replace(/[óòö]/g, 'o').replace(/[úùü]/g, 'u').replace(/ñ/g, 'n')
                    .replace(/[^a-z0-9_]/g, '') || `col${_i}`
                );
                const originalHeaders = rawHeaders.map(h => limpiarTexto(h));
                const exams = [];
                rows.slice(1).forEach(row => {
                    const obj = {};
                    let hasValue = false;
                    headers.forEach((h, i) => {
                        const val = limpiarTexto(row[i] !== undefined ? row[i] : '');
                        if (h && val !== '') { obj[h] = val; obj[`_label_${h}`] = originalHeaders[i]; hasValue = true; }
                    });
                    if (hasValue) exams.push(obj);
                });
                return exams.length ? exams : null;
            };

            const subirExamenes = async (datos, base64, nombre) => {
                const ahora = new Date();
                const fechaTxt = ahora.toLocaleString('es-CL');
                safeStorage.setItem('totem_examenes_data', JSON.stringify(datos));
                safeStorage.setItem('totem_examenes_updated', fechaTxt);
                safeStorage.setItem('totem_examenes_nombre', nombre);
                if (!window._sb) {
                    setExamenesInfo({ status: 'local', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                    return;
                }
                setExamenesInfo({ status: 'subiendo', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                // El tótem solo necesita 'data' para mostrar los exámenes; 'archivo_base64' es únicamente
                // para poder re-descargar el Excel original. Si el archivo es muy grande, el request supera
                // el límite de tamaño del servidor, así que en ese caso subimos solo los datos (lo esencial).
                const MAX_BASE64 = 3000000; // ~3 MB
                const incluirArchivoInicial = !!base64 && base64.length <= MAX_BASE64;
                const fila = (conArchivo) => ({
                    id: 1, data: datos,
                    archivo_base64: conArchivo ? base64 : null,
                    archivo_nombre: nombre, total_filas: datos.length, actualizado_en: ahora.toISOString()
                });
                const emitirSenal = () => window._sb.from('totem_examenes_signal')
                    .upsert({ id: 1, version: ahora.toISOString() }, { onConflict: 'id' }).then(() => {}, () => {});
                try {
                    let conArchivo = incluirArchivoInicial;
                    let { error } = await window._sb.from('totem_examenes').upsert(fila(conArchivo), { onConflict: 'id' });
                    // Si falló incluyendo el archivo (probable exceso de tamaño), reintentar solo con los datos.
                    if (error && conArchivo) {
                        conArchivo = false;
                        const r2 = await window._sb.from('totem_examenes').upsert(fila(false), { onConflict: 'id' });
                        error = r2.error;
                    }
                    if (error) throw error;
                    await emitirSenal();
                    logEvento('admin_examenes_sync', { filas: datos.length, archivo: nombre, sin_archivo: !conArchivo });
                    setExamenesInfo({ status: conArchivo ? 'sync' : 'sync_sin_archivo', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                } catch(err) {
                    console.error('Error subiendo exámenes:', err);
                    setExamenesInfo({ status: 'error', nombre, fecha: fechaTxt, filas: datos.length, descargando: false });
                }
            };

            const descargarExamenes = async () => {
                setExamenesInfo(p => ({ ...p, descargando: true }));
                try {
                    if (!window._sb) throw new Error('sin conexión');
                    const { data, error } = await window._sb
                        .from('totem_examenes').select('archivo_base64, archivo_nombre').eq('id', 1).maybeSingle();
                    if (error || !data || !data.archivo_base64) {
                        alert('No hay un Excel original descargable. Si el archivo que subiste era muy pesado, los exámenes igual se publicaron, pero no se guardó el archivo original para descargar.'); return;
                    }
                    const nombre = data.archivo_nombre || 'examenes.xlsx';
                    const blob = base64ToBlob(data.archivo_base64, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = nombre;
                    document.body.appendChild(a); a.click(); a.remove();
                    setTimeout(() => URL.revokeObjectURL(url), 150);
                    logEvento('admin_examenes_descarga', { archivo: nombre });
                } catch(err) {
                    alert('No se pudo descargar. Revisa la conexión e intenta de nuevo.');
                } finally {
                    setExamenesInfo(p => ({ ...p, descargando: false }));
                }
            };

            const eliminarExamenes = async () => {
                if (!confirm('¿Eliminar todos los exámenes del servidor? Esta acción no se puede deshacer.')) return;
                try {
                    if (window._sb) {
                        await window._sb.from('totem_examenes').delete().eq('id', 1);
                        await window._sb.from('totem_examenes_signal').upsert({ id: 1, version: new Date().toISOString() }, { onConflict: 'id' }).then(() => {}, () => {});
                    }
                    setExamenes([]);
                    setExamenesInfo({ status: 'idle', nombre: '', fecha: '', filas: 0, descargando: false });
                    safeStorage.setItem('totem_examenes_data', '[]');
                    logEvento('admin_examenes_eliminar');
                } catch(e) { alert('Error al eliminar. Revisa la conexión.'); }
            };

            const handleExamenesUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                logEvento('admin_examenes_inicio', { archivo: file.name });
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBuffer = new Uint8Array(evt.target.result);
                        const workbook = window.XLSX.read(dataBuffer, { type: 'array', raw: false });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        const exams = processExamenes(json);
                        if (exams) {
                            setExamenes(exams);
                            subirExamenes(exams, arrayBufferToBase64(evt.target.result), file.name);
                        } else {
                            alert('No se encontraron filas válidas. Asegúrate de que la primera fila sea el encabezado.');
                        }
                    } catch(err) { console.error(err); alert('Error al leer el archivo. Asegúrate de que sea un Excel válido (.xlsx).'); }
                };
                reader.readAsArrayBuffer(file);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setError('');
                logEvento('admin_upload_inicio', { archivo: file.name });

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const dataBuffer = new Uint8Array(evt.target.result);
                        const workbook = window.XLSX.read(dataBuffer, { type: 'array', raw: false });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        const datosValidos = processData(json);
                        if (datosValidos && datosValidos.length > 0) {
                            const base64 = arrayBufferToBase64(evt.target.result);
                            subirSabana(datosValidos, base64, file.name);
                        }
                    } catch (err) {
                        console.error(err);
                        setError('Error al leer el archivo. Asegúrate de que sea la sábana correcta (.xlsx)');
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            // Clave única de una clase para detectar duplicados (mismo día/horario/sala/docente/etc.)
            const claveClase = (c) => [c.dia, c.horaInicio, c.horaFin, c.sala, c.docente, c.asignatura, c.seccion, c.jornada, c.escuela]
                .map(v => String(v ?? '').trim().toLowerCase()).join('|');

            const dedupClases = (lista) => {
                const vistos = new Set();
                return (lista || []).filter(item => {
                    const k = claveClase(item);
                    if (vistos.has(k)) return false;
                    vistos.add(k);
                    return true;
                });
            };

            const processData = (rows) => {
                if (rows.length < 2) { setError('El archivo parece estar vacío.'); return null; }
                const dataRows = rows.slice(1);
                const diasMapa = { 41: 'Lunes', 42: 'Martes', 43: 'Miércoles', 44: 'Jueves', 45: 'Viernes', 46: 'Sábado' };
                const processed = [];

                dataRows.forEach(row => {
                    Object.entries(diasMapa).forEach(([colIdx, nombreDia]) => {
                        if (String(row[colIdx] || '').trim().toUpperCase() === 'X') {
                            processed.push({
                                escuela: String(row[8] || '').trim(),
                                jornada: String(row[10] || '').trim(),
                                seccion: String(row[13] || '').trim(),
                                asignatura: String(row[22] || '').trim(),
                                docente: String(row[34] || '').trim(),
                                sala: parseSala(String(row[36] || '')),
                                horaInicio: formatExcelTime(row[39]),
                                horaFin: formatExcelTime(row[40]),
                                alumnos: String(row[54] || '0').trim(),
                                dia: nombreDia
                            });
                        }
                    });
                });

                const datosFiltrados = processed.filter(item => item.asignatura && item.horaInicio !== '00:00');
                if (datosFiltrados.length === 0) { setError('No se encontraron clases válidas. Verifica la estructura.'); return null; }

                // Omitir clases duplicadas: misma jornada, día, horario, sala, docente, asignatura y sección.
                // A veces la sábana trae filas repetidas; mostramos solo una.
                const datosValidos = dedupClases(datosFiltrados);

                setData(datosValidos);
                setAvailableEscuelas([...new Set(datosValidos.map(i => i.escuela).filter(Boolean))].sort());
                setAvailableJornadas([...new Set(datosValidos.map(i => i.jornada).filter(Boolean))].sort());
                setAvailableSiglas([...new Set(datosValidos.map(i => i.seccion).filter(Boolean))].sort());
                setIsLoaded(true);
                setActiveTab('CARTELERA');
                logEvento('admin_upload_exito', { filas: datosValidos.length });
                window.__INITIAL_DATA__ = datosValidos;
                return datosValidos;
            };

            const getClaseStatus = (clase) => {
                if (clase.dia !== todayName) return { texto: 'PROGRAMADA', bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };

                const currentMins = filterTime.getHours() * 60 + filterTime.getMinutes();
                const [sh, sm] = clase.horaInicio.split(':').map(Number);
                const [eh, em] = clase.horaFin.split(':').map(Number);
                
                const startMins = (sh * 60) + (sm || 0);
                const endMins = (eh * 60) + (em || 0);

                if (isNaN(startMins) || isNaN(endMins)) return { texto: 'PROGRAMADA', bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };

                const diffStart = startMins - currentMins;
                const diffEnd = endMins - currentMins;

                if (currentMins < startMins) {
                    if (diffStart <= 30 && diffStart > 0) {
                        return { texto: '¡POR COMENZAR!', desc: `en ${diffStart} min`, bg: 'bg-yellow-100 dark:bg-duoc-yellow/20', text: 'text-yellow-800 dark:text-duoc-yellow', border: 'border-duoc-yellow', isImportant: true };
                    }
                    return { texto: 'POR COMENZAR', bg: 'bg-blue-50 dark:bg-duoc-lightblue/20', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-blue-200 dark:border-blue-800', isImportant: false };
                } else if (currentMins >= endMins) {
                    return { texto: 'REALIZADA', bg: 'bg-slate-100 dark:bg-slate-800', text: 'text-slate-500 dark:text-slate-500', border: 'border-slate-200 dark:border-slate-700', isImportant: false };
                } else {
                    if (diffEnd <= 30 && diffEnd > 0) {
                        return { texto: '¡POR FINALIZAR!', desc: `quedan ${diffEnd} min`, bg: 'bg-blue-100 dark:bg-duoc-lightblue/30', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-duoc-lightblue', isImportant: true };
                    }
                    return { texto: 'EN CURSO', bg: 'bg-green-100 dark:bg-green-900/40', text: 'text-green-700 dark:text-green-400', border: 'border-green-500 dark:border-green-600 shadow-[0_0_15px_rgba(34,197,94,0.3)]', isImportant: true };
                }
            };

            // Convierte una fecha de examen (texto o serial Excel) a objeto Date a medianoche
            const parseExamenFecha = (raw) => {
                if (raw == null || raw === '') return null;
                const s = String(raw).trim();
                // Serial de Excel (ej: 46192)
                if (/^\d{5}(\.\d+)?$/.test(s)) {
                    const ms = (parseFloat(s) - 25569) * 86400000;
                    const d = new Date(ms);
                    return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
                }
                // ISO: yyyy-mm-dd
                let m = s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
                if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
                // dd-mm-yyyy / dd/mm/yyyy
                m = s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2,4})/);
                if (m) { let yr = +m[3]; if (yr < 100) yr += 2000; return new Date(yr, +m[2] - 1, +m[1]); }
                return null;
            };

            // Fecha de examen legible (ej. "Mié 15 jul"). Si no se puede interpretar, deja el texto original.
            const fmtFechaExamen = (raw) => {
                const d = parseExamenFecha(raw);
                if (!d) return String(raw == null ? '' : raw).trim();
                const txt = d.toLocaleDateString('es-CL', { weekday: 'short', day: '2-digit', month: 'short' });
                return txt.charAt(0).toUpperCase() + txt.slice(1);
            };
            // Hora de examen formateada (vacío si no hay hora válida, en vez de "00:00").
            const fmtHoraExamen = (raw) => {
                if (raw == null || String(raw).trim() === '') return '';
                const t = formatExcelTime(raw);
                return t === '00:00' ? '' : t;
            };

            // Estado del examen leído igual que una clase de la sábana (en curso / por comenzar / realizado)
            const getExamenStatus = (ex) => {
                const fechaStr = ex.fecha || ex.fecha_examen || ex.fecha_de_examen || ex.date || '';
                const fecha = parseExamenFecha(fechaStr);
                if (!fecha) return null;
                const hoy = new Date(filterTime.getFullYear(), filterTime.getMonth(), filterTime.getDate());
                const diffDias = Math.round((fecha - hoy) / 86400000);

                if (diffDias > 0) {
                    if (diffDias === 1) return { texto: 'MAÑANA', bg: 'bg-blue-50 dark:bg-duoc-lightblue/20', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-blue-200 dark:border-blue-800', isImportant: false };
                    return { texto: 'PROGRAMADO', desc: `en ${diffDias} días`, bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };
                }
                if (diffDias < 0) {
                    return { texto: 'REALIZADO', bg: 'bg-slate-100 dark:bg-slate-800', text: 'text-slate-500 dark:text-slate-500', border: 'border-slate-200 dark:border-slate-700', isImportant: false };
                }

                // Es hoy → usar el horario igual que getClaseStatus
                const horaIstr = formatExcelTime(ex.hora_inicio || ex.horainicio || ex.hora_inicio_examen || ex.hora || '');
                const horaFstr = formatExcelTime(ex.hora_fin || ex.horafin || ex.hora_fin_examen || '');
                const [sh, sm] = horaIstr.split(':').map(Number);
                let [eh, em] = horaFstr.split(':').map(Number);
                const currentMins = filterTime.getHours() * 60 + filterTime.getMinutes();
                const startMins = (sh * 60) + (sm || 0);
                let endMins = (eh * 60) + (em || 0);
                if (isNaN(startMins) || startMins === 0) return { texto: 'HOY', bg: 'bg-yellow-100 dark:bg-duoc-yellow/20', text: 'text-yellow-800 dark:text-duoc-yellow', border: 'border-duoc-yellow', isImportant: true };
                if (isNaN(endMins) || endMins <= startMins) endMins = startMins + 120; // duración por defecto 2 h

                const diffStart = startMins - currentMins;
                const diffEnd = endMins - currentMins;
                if (currentMins < startMins) {
                    if (diffStart <= 30) return { texto: '¡POR COMENZAR!', desc: `en ${diffStart} min`, bg: 'bg-yellow-100 dark:bg-duoc-yellow/20', text: 'text-yellow-800 dark:text-duoc-yellow', border: 'border-duoc-yellow', isImportant: true };
                    return { texto: 'HOY · POR COMENZAR', bg: 'bg-blue-50 dark:bg-duoc-lightblue/20', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-blue-200 dark:border-blue-800', isImportant: true };
                } else if (currentMins >= endMins) {
                    return { texto: 'REALIZADO', bg: 'bg-slate-100 dark:bg-slate-800', text: 'text-slate-500 dark:text-slate-500', border: 'border-slate-200 dark:border-slate-700', isImportant: false };
                } else {
                    if (diffEnd <= 30 && diffEnd > 0) return { texto: '¡POR FINALIZAR!', desc: `quedan ${diffEnd} min`, bg: 'bg-blue-100 dark:bg-duoc-lightblue/30', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-duoc-lightblue', isImportant: true };
                    return { texto: 'EN CURSO', bg: 'bg-green-100 dark:bg-green-900/40', text: 'text-green-700 dark:text-green-400', border: 'border-green-500 dark:border-green-600 shadow-[0_0_15px_rgba(34,197,94,0.3)]', isImportant: true };
                }
            };

            const sortedFilteredData = useMemo(() => {
                const filtered = dedupClases(data).filter(item => {
                    const statusInfo = getClaseStatus(item);
                    const matchDia = activeDia === 'Todos' || item.dia === activeDia;
                    const matchJornada = selectedJornada === '' || item.jornada === selectedJornada;
                    const matchEscuela = selectedEscuela === '' || item.escuela === selectedEscuela;
                    const matchSigla = selectedSigla === '' || item.seccion === selectedSigla;
                    const searchLower = searchTerm.toLowerCase();
                    const matchSearch = searchTerm === '' || 
                        item.asignatura.toLowerCase().includes(searchLower) ||
                        item.docente.toLowerCase().includes(searchLower) ||
                        item.seccion.toLowerCase().includes(searchLower) ||
                        item.sala.toLowerCase().includes(searchLower);
                    
                    const matchActive = 
                        activeFilter === 'ALL' ? true :
                        activeFilter === 'EN_CURSO' ? (statusInfo.texto === 'EN CURSO' || statusInfo.texto === '¡POR FINALIZAR!') :
                        activeFilter === 'POR_EMPEZAR' ? statusInfo.texto === '¡POR COMENZAR!' :
                        activeFilter === 'POR_FINALIZAR' ? statusInfo.texto === '¡POR FINALIZAR!' : true;

                    return matchDia && matchJornada && matchEscuela && matchSigla && matchSearch && matchActive;
                });
                return [...filtered].sort((a, b) => {
                    const statusA = getClaseStatus(a);
                    const statusB = getClaseStatus(b);
                    
                    const getPriority = (status) => {
                        if (status.texto === 'EN CURSO' || status.texto === '¡POR COMENZAR!' || status.texto === '¡POR FINALIZAR!') return 1;
                        if (status.texto === 'REALIZADA') return 3;
                        return 2; 
                    };

                    const prioA = getPriority(statusA);
                    const prioB = getPriority(statusB);

                    if (prioA !== prioB) return prioA - prioB;

                    return a.horaInicio.localeCompare(b.horaInicio);
                });
            }, [data, activeDia, selectedJornada, selectedEscuela, selectedSigla, searchTerm, activeFilter, todayName, filterTime]);

            // Opciones disponibles para los filtros de la vista de exámenes (carrera/nivel/jornada).
            const examenOpciones = useMemo(() => {

                    const nv = getExamField(ex, EXAM_KEYS.nivel); if (nv) n.add(nv);
                    const jv = getExamField(ex, EXAM_KEYS.jornada); if (jv) j.add(jv);
                });
                const ordNum = (a, b) => { const na = parseFloat(a), nb = parseFloat(b); if (!isNaN(na) && !isNaN(nb)) return na - nb; return String(a).localeCompare(String(b)); };
                return { carreras: [...c].sort((a, b) => a.localeCompare(b)), niveles: [...n].sort(ordNum), jornadas: [...j].sort((a, b) => a.localeCompare(b)) };
            }, [examenes]);

                                            {(() => {

                                                return fechas.length > 0 ? (

                                        ) : (() => {
                                            const term = examenSearch.toLowerCase();
                                            const filtered = examenes.filter(ex => {
                                                const vals = Object.entries(ex).filter(([k]) => !k.startsWith('_label_')).map(([,v]) => v.toLowerCase()).join(' ');
                                                const passSearch = !term || vals.includes(term);
                                                const fechaKey = Object.keys(ex).find(k => k === 'fecha' || k === 'fecha_examen' || k === 'fecha_de_examen' || k === 'date' || k.includes('fecha'));
                                                const passDate = !examenFechaFilter || (fechaKey && ex[fechaKey] === examenFechaFilter);
                                                const passCarrera = !examenCarreraFilter || getExamField(ex, EXAM_KEYS.carrera) === examenCarreraFilter;
                                                const passNivel = !examenNivelFilter || getExamField(ex, EXAM_KEYS.nivel) === examenNivelFilter;
                                                const passJornada = !examenJornadaFilter || getExamField(ex, EXAM_KEYS.jornada) === examenJornadaFilter;
                                                const txtEstado = (() => { const e = getExamenStatus(ex); return e ? e.texto : ''; })();
                                                const passEstado =
                                                    examenFilter === 'ALL' ? true :
                                                    examenFilter === 'EN_CURSO' ? txtEstado === 'EN CURSO' :
                                                    examenFilter === 'POR_EMPEZAR' ? (txtEstado === '¡POR COMENZAR!' || txtEstado === 'HOY · POR COMENZAR' || txtEstado === 'HOY') :
                                                    examenFilter === 'POR_FINALIZAR' ? txtEstado === '¡POR FINALIZAR!' : true;
                                                return passSearch && passDate && passCarrera && passNivel && passJornada && passEstado;
                                            }).sort((a, b) => {
                                                const fa = parseExamenFecha(a.fecha || a.fecha_examen || a.fecha_de_examen || a.date || '');
                                                const fb = parseExamenFecha(b.fecha || b.fecha_examen || b.fecha_de_examen || b.date || '');
                                                if (fa && fb && fa - fb !== 0) return fa - fb;
                                                if (fa && !fb) return -1;

                                                const hb = formatExcelTime(b.hora_inicio || b.horainicio || b.hora || '');

                                </>
                            )}
                            <button onClick={() => { logEvento('pantalla_completa', {accion: document.fullscreenElement ? 'salir' : 'entrar'}); openSecurityModal(document.fullscreenElement ? 'FULLSCREEN_EXIT' : 'FULLSCREEN_ENTER'); trackAction('buttons'); }} className="flex items-center justify-center p-2 lg:p-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:text-white rounded-lg lg:rounded-xl transition-colors shadow-sm border border-transparent dark:border-slate-700 shrink-0" title="Pantalla Completa">
                                <Icons.Fullscreen cls="w-4 h-4 lg:w-5 lg:h-5" />
                            </button>
                            {activeTab === 'CARTELERA' ? (
                                <button onClick={() => { openSecurityModal('ADMIN'); trackAction('buttons'); }} className="flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg transition-all border bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-transparent dark:border-slate-700 hover:bg-slate-200 dark:hover:text-white shadow-sm whitespace-nowrap">
                                    <Icons.Settings cls="w-4 h-4 lg:w-5 lg:h-5" /> Admin
                                </button>
                            ) : (
                                <button onClick={() => { setActiveTab('CARTELERA'); setAdminSubTab('DASHBOARD'); trackAction('buttons'); }} className="flex items-center gap-1.5 lg:gap-2 px-4 py-2 lg:px-6 lg:py-3 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg transition-all border bg-duoc-blue dark:bg-slate-800 text-white dark:text-duoc-yellow border-transparent dark:border-slate-700 shadow-md hover:bg-[#004080] dark:hover:bg-slate-700 whitespace-nowrap">
                                    <Icons.LayoutList cls="w-4 h-4 lg:w-5 lg:h-5" /> Vista Estudiantes
                                </button>
                            )}
                        </div>

                        {/* BARRA NAVEGACIÓN MÓVIL */}
                        <div className="flex lg:hidden w-full gap-2">
                            {activeTab === 'CARTELERA' ? (
                                <>
                                    <button onClick={() => { setShowSurveyModal(true); trackAction('buttons'); logEvento('encuesta_abrir'); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-duoc-yellow text-duoc-blue rounded-xl font-black text-sm shadow-md active:scale-95 transition-transform">
                                        <Icons.Star cls="w-5 h-5" fill="currentColor" /> Evaluar
                                    </button>
                                    <button onClick={() => { openSecurityModal('ADMIN'); trackAction('buttons'); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-[#00274c] dark:bg-slate-800 text-white dark:text-duoc-yellow rounded-xl font-bold text-sm shadow-md active:scale-95 transition-transform border border-transparent dark:border-slate-700">
                                        <Icons.Settings cls="w-5 h-5" /> Admin
                                    </button>
                                </>
                            ) : (
                                <button onClick={() => { setActiveTab('CARTELERA'); setAdminSubTab('DASHBOARD'); trackAction('buttons'); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-duoc-blue text-white rounded-xl font-bold text-sm shadow-md active:scale-95 transition-transform">
                                    <Icons.LayoutList cls="w-5 h-5" /> Vista Estudiantes
                                </button>
                            )}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
</script>
</body>
</html>
