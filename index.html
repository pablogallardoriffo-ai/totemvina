        const App = () => {
            const [filterTime, setFilterTime] = useState(new Date());
            const [data, setData] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [error, setError] = useState('');
            
            // Navegación
            const [activeTab, setActiveTab] = useState('CARTELERA');
            const [adminSubTab, setAdminSubTab] = useState('DASHBOARD');
            
            // Suspensión (Modo Institucional)
            const [showSuspension, setShowSuspension] = useState(false);
            const suspensionScrollRef = useRef(null);

            // Encuestas y Modales
            const [surveys, setSurveys] = useState([]);
            const [showSurveyModal, setShowSurveyModal] = useState(false);
            const [surveyData, setSurveyData] = useState({ rating: 0, comment: '', name: '', email: '' });
            const [surveyStep, setSurveyStep] = useState(1);
            
            const [showQrModal, setShowQrModal] = useState(false);
            const [qrUrl, setQrUrl] = useState(window.location.href);

            // Seguridad Unificada y Kiosco
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordAction, setPasswordAction] = useState(null);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState(false);
            const authorizedFullscreenExit = useRef(false);

            // UI y Correos
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [metrics, setMetrics] = useState({ clicks: 0, filters: 0, buttons: 0 });
            const [sessionId] = useState(() => { try { let s = sessionStorage.getItem('totem_sid'); if (!s) { s = Date.now().toString(36) + Math.random().toString(36).slice(2, 8); sessionStorage.setItem('totem_sid', s); } return s; } catch(e) { return Date.now().toString(36); } });
            const metricsRef = useRef({ clicks: 0, filters: 0, buttons: 0 });
            const metricsSyncTimer = useRef(null);
            const searchLogTimer = useRef(null);
            const [isConnecting, setIsConnecting] = useState(!!window._sb);
            const [emailModal, setEmailModal] = useState({ show: false, target: '', status: 'idle', errorMsg: '' });

            const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const todayName = diasSemana[filterTime.getDay()];

            const [activeDia, setActiveDia] = useState(todayName === 'Domingo' ? 'Lunes' : todayName);
            const [selectedJornada, setSelectedJornada] = useState('');
            const [selectedEscuela, setSelectedEscuela] = useState('');
            const [selectedSigla, setSelectedSigla] = useState(''); 
            const [searchTerm, setSearchTerm] = useState('');
            const [activeFilter, setActiveFilter] = useState('ALL'); 
            
            const [availableJornadas, setAvailableJornadas] = useState([]);
            const [availableEscuelas, setAvailableEscuelas] = useState([]);
            const [availableSiglas, setAvailableSiglas] = useState([]); 

            const safeStorage = {
                getItem: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
                setItem: (key, value) => { try { localStorage.setItem(key, value); } catch(e) { console.warn("Storage bloqueado"); } }
            };

            const trackAction = (type) => {
                setMetrics(prev => {
                    const next = { ...prev, [type]: prev[type] + 1 };
                    safeStorage.setItem('totem_metrics', JSON.stringify(next));
                    metricsRef.current = next;
                    return next;
                });
                if (window._sb) {
                    clearTimeout(metricsSyncTimer.current);
                    metricsSyncTimer.current = setTimeout(() => {
                        const m = metricsRef.current;
                        window._sb.from('totem_metricas').upsert(
                            { session_id: sessionId, clicks: m.clicks, filters: m.filters, buttons: m.buttons, updated_at: new Date().toISOString() },
                            { onConflict: 'session_id' }
                        ).then(() => {}).catch(() => {});
                    }, 15000);
                }
            };

            const logEvento = (tipo, detalle) => {
                if (!window._sb) return;
                const payload = { session_id: sessionId, tipo };
                if (detalle && Object.keys(detalle).length > 0) payload.detalle = detalle;
                window._sb.from('totem_eventos').insert(payload).then(() => {}).catch(() => {});
            };

            // Efectos Iniciales
            useEffect(() => {
                const initMetrics = JSON.parse(safeStorage.getItem('totem_metrics')) || { clicks: 0, filters: 0, buttons: 0 };
                if (window.__INITIAL_METRICS__) Object.assign(initMetrics, window.__INITIAL_METRICS__);
                setMetrics(initMetrics);

                const handleUserClick = () => {
                    setMetrics(prev => {
                        const next = { ...prev, clicks: prev.clicks + 1 };
                        safeStorage.setItem('totem_metrics', JSON.stringify(next));
                        return next;
                    });
                    setShowSuspension(false); // Despertar
                };
                window.addEventListener('click', handleUserClick);
                window.addEventListener('touchstart', handleUserClick);
                
                return () => {
                    window.removeEventListener('click', handleUserClick);
                    window.removeEventListener('touchstart', handleUserClick);
                };
            }, []);

            useEffect(() => {
                let timeout;
                const checkInactivity = () => {
                    timeout = setTimeout(() => {
                        // Solo suspender en desktop si está inactivo
                        if (window.innerWidth >= 1024 && !showPasswordModal && !showSurveyModal && !showQrModal && !emailModal.show && !kioskLocked && activeTab === 'CARTELERA') {
                            setShowSuspension(true);
                        }

                        // Limpiar Filtros
                        const realTimeDayName = diasSemana[new Date().getDay()];
                        setActiveDia(realTimeDayName === 'Domingo' ? 'Lunes' : realTimeDayName);
                        setSelectedJornada('');
                        setSelectedEscuela('');
                        setSelectedSigla('');
                        setSearchTerm('');
                        setActiveFilter('ALL');

                        // Cerrar modales
                        if (activeTab === 'ADMIN') {
                            setActiveTab('CARTELERA');
                            setAdminSubTab('DASHBOARD');
                        }
                        setShowPasswordModal(false);
                        setShowSurveyModal(false);
                        setShowQrModal(false);
                        setEmailModal({ show: false, target: '', status: 'idle', errorMsg: '' });
                        setPasswordInput('');
                    }, 30000); // 30 Segundos
                };

                checkInactivity();
                
                const resetTimer = () => {
                    clearTimeout(timeout);
                    setShowSuspension(false);
                    checkInactivity();
                };

                window.addEventListener('mousemove', resetTimer);
                window.addEventListener('keypress', resetTimer);
                window.addEventListener('touchstart', resetTimer);
                window.addEventListener('click', resetTimer);

                return () => {
                    clearTimeout(timeout);
                    window.removeEventListener('mousemove', resetTimer);
                    window.removeEventListener('keypress', resetTimer);
                    window.removeEventListener('touchstart', resetTimer);

            const formatExcelTime = (val) => {
                if (val == null || val === '') return "00:00";
                const strVal = String(val).trim();
                const timeMatch = strVal.match(/^(\d{1,2}):(\d{2})/);
                if (timeMatch) return `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;
                const numVal = Number(strVal);
                if (!isNaN(numVal) && numVal > 0 && numVal < 1) {
                    const totalMinutes = Math.round(numVal * 24 * 60);
                    const h = Math.floor(totalMinutes / 60);
                    const m = totalMinutes % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }
                return "00:00";
            };

            };

                reader.onload = (evt) => {
                    try {
                        const dataBuffer = new Uint8Array(evt.target.result);
                        const workbook = window.XLSX.read(dataBuffer, { type: 'array', raw: false });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                        processData(json);
                    } catch (err) {
                        console.error(err);
                        setError('Error al leer el archivo. Asegúrate de que sea la sábana correcta (.xlsx)');
                    }
                };
                reader.readAsArrayBuffer(file);

            const processData = (rows) => {
                if (rows.length < 2) { setError('El archivo parece estar vacío.'); return; }

                const diasMapa = { 41: 'Lunes', 42: 'Martes', 43: 'Miércoles', 44: 'Jueves', 45: 'Viernes', 46: 'Sábado' };
                const processed = [];

                dataRows.forEach(row => {
                    Object.entries(diasMapa).forEach(([colIdx, nombreDia]) => {
                        if (String(row[colIdx] || '').trim().toUpperCase() === 'X') {
                            processed.push({
                                escuela: String(row[8] || '').trim(),
                                jornada: String(row[10] || '').trim(),
                                seccion: String(row[13] || '').trim(),
                                asignatura: String(row[22] || '').trim(),
                                docente: String(row[34] || '').trim(),
                                sala: parseSala(String(row[36] || '')),
                                horaInicio: formatExcelTime(row[39]),
                                horaFin: formatExcelTime(row[40]),
                                alumnos: String(row[54] || '0').trim(),
                                dia: nombreDia
                            });
                        }
                    });
                });

                const datosValidos = processed.filter(item => item.asignatura && item.horaInicio !== '00:00');
                if (datosValidos.length === 0) { setError('No se encontraron clases válidas. Verifica la estructura.'); return; }

                setData(datosValidos);
                setAvailableEscuelas([...new Set(datosValidos.map(i => i.escuela).filter(Boolean))].sort());
                setAvailableJornadas([...new Set(datosValidos.map(i => i.jornada).filter(Boolean))].sort());
                setAvailableSiglas([...new Set(datosValidos.map(i => i.seccion).filter(Boolean))].sort());

                safeStorage.setItem('totem_last_updated', new Date().toLocaleString('es-CL'));
            };

            const getClaseStatus = (clase) => {
                if (clase.dia !== todayName) return { texto: 'PROGRAMADA', bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };

                const currentMins = filterTime.getHours() * 60 + filterTime.getMinutes();
                const [sh, sm] = clase.horaInicio.split(':').map(Number);
                const [eh, em] = clase.horaFin.split(':').map(Number);
                
                const startMins = (sh * 60) + (sm || 0);
                const endMins = (eh * 60) + (em || 0);

                if (isNaN(startMins) || isNaN(endMins)) return { texto: 'PROGRAMADA', bg: 'bg-slate-200 dark:bg-slate-800', text: 'text-slate-600 dark:text-slate-400', border: 'border-slate-300 dark:border-slate-700', isImportant: false };

                const diffStart = startMins - currentMins;
                const diffEnd = endMins - currentMins;

                if (currentMins < startMins) {
                    if (diffStart <= 30 && diffStart > 0) {
                        return { texto: '¡POR EMPEZAR!', desc: `en ${diffStart} min`, bg: 'bg-yellow-100 dark:bg-duoc-yellow/20', text: 'text-yellow-800 dark:text-duoc-yellow', border: 'border-duoc-yellow', isImportant: true };
                    }
                    return { texto: 'POR REALIZAR', bg: 'bg-blue-50 dark:bg-duoc-lightblue/20', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-blue-200 dark:border-blue-800', isImportant: false };
                } else if (currentMins >= endMins) {
                    return { texto: 'REALIZADA', bg: 'bg-slate-100 dark:bg-slate-800', text: 'text-slate-500 dark:text-slate-500', border: 'border-slate-200 dark:border-slate-700', isImportant: false };
                } else {
                    if (diffEnd <= 30 && diffEnd > 0) {
                        return { texto: '¡POR FINALIZAR!', desc: `quedan ${diffEnd} min`, bg: 'bg-blue-100 dark:bg-duoc-lightblue/30', text: 'text-duoc-lightblue dark:text-blue-300', border: 'border-duoc-lightblue', isImportant: true };
                    }
                    return { texto: 'EN CURSO', bg: 'bg-green-100 dark:bg-green-900/40', text: 'text-green-700 dark:text-green-400', border: 'border-green-500 dark:border-green-600 shadow-[0_0_15px_rgba(34,197,94,0.3)]', isImportant: true };
                }

            const sortedFilteredData = useMemo(() => {

                    const matchJornada = selectedJornada === '' || item.jornada === selectedJornada;
                    const matchEscuela = selectedEscuela === '' || item.escuela === selectedEscuela;
                    const matchSigla = selectedSigla === '' || item.seccion === selectedSigla;
                    const searchLower = searchTerm.toLowerCase();
                    const matchSearch = searchTerm === '' || 
                        item.asignatura.toLowerCase().includes(searchLower) ||
                        item.docente.toLowerCase().includes(searchLower) ||
                        item.seccion.toLowerCase().includes(searchLower) ||
                        item.sala.toLowerCase().includes(searchLower);
                    
                    const matchActive = 
                        activeFilter === 'ALL' ? true :
                        activeFilter === 'EN_CURSO' ? (statusInfo.texto === 'EN CURSO' || statusInfo.texto === '¡POR FINALIZAR!') :
                        activeFilter === 'POR_EMPEZAR' ? statusInfo.texto === '¡POR EMPEZAR!' :
                        activeFilter === 'POR_FINALIZAR' ? statusInfo.texto === '¡POR FINALIZAR!' : true;

                    return matchDia && matchJornada && matchEscuela && matchSigla && matchSearch && matchActive;
                });
                return [...filtered].sort((a, b) => {
                    const statusA = getClaseStatus(a);
                    const statusB = getClaseStatus(b);
                    
                    const getPriority = (status) => {
                        if (status.texto === 'EN CURSO' || status.texto === '¡POR EMPEZAR!' || status.texto === '¡POR FINALIZAR!') return 1;
                        if (status.texto === 'REALIZADA') return 3;
                        return 2; 
                    };

                    const prioA = getPriority(statusA);
                    const prioB = getPriority(statusB);

                    if (prioA !== prioB) return prioA - prioB;

                    return a.horaInicio.localeCompare(b.horaInicio);
                });

                surveys.forEach(s => {
                    if(!s.comment) return;
                    const tokens = s.comment.toLowerCase().replace(/[^\w\sáéíóúüñ]/g, '').split(/\s+/);
                    tokens.forEach(w => {
                        if(w.length > 3 && !stopWords.includes(w)) {

                return Object.entries(words)

                    .slice(0, 15);
            };

                                            onClick={handleSendReportEmail} 
                                            disabled={!emailModal.target.includes('@')}
                                            className="w-full bg-duoc-blue dark:bg-duoc-yellow text-white dark:text-duoc-blue rounded-xl py-3 lg:py-4 font-black text-lg lg:text-xl hover:bg-[#004080] dark:hover:bg-yellow-400 transition-colors shadow-lg disabled:opacity-50 disabled:cursor-not-allowed mt-2"
                                        >
                                            Enviar Reporte
                                        </button>
                                    </div>
                                )}

                                {emailModal.status === 'sending' && (
                                    <div className="py-8 lg:py-10 animate-fade-in flex flex-col items-center">
                                        <div className="w-16 h-16 lg:w-20 lg:h-20 border-[6px] lg:border-8 border-slate-100 border-t-duoc-lightblue dark:border-slate-700 dark:border-t-duoc-yellow rounded-full animate-spin mb-4 lg:mb-6"></div>
                                        <h3 className="text-2xl lg:text-3xl font-black text-duoc-blue dark:text-white mb-2 lg:mb-3">Enviando...</h3>
                                        <p className="text-slate-500 dark:text-slate-400 text-sm lg:text-lg">Generando y enviando reporte.</p>
                                    </div>
                                )}

                                {emailModal.status === 'success' && (
                                    <div className="py-6 lg:py-8 animate-fade-in flex flex-col items-center">
                                        <div className="w-20 h-20 lg:w-24 lg:h-24 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mb-4 lg:mb-6">
                                            <Icons.Check cls="w-10 h-10 lg:w-12 lg:h-12 text-green-600 dark:text-green-400" />
                                        </div>
                                        <h3 className="text-2xl lg:text-3xl font-black text-duoc-blue dark:text-white mb-2 lg:mb-3">¡Enviado Exitosamente!</h3>
                                        <p className="text-slate-500 dark:text-slate-400 text-sm lg:text-lg mb-6 lg:mb-8">Revisa tu bandeja de entrada.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {kioskLocked && (
                        <div className="fixed inset-0 bg-red-600/95 backdrop-blur-md z-[9999] flex items-center justify-center animate-fade-in px-4">
                            <div className="bg-white dark:bg-duoc-card p-8 lg:p-10 rounded-[2rem] shadow-2xl max-w-lg w-full text-center border-4 border-red-500">
                                <div className="w-20 h-20 lg:w-24 lg:h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 lg:mb-6">
                                    <Icons.Lock cls="w-10 h-10 lg:w-12 lg:h-12 text-red-600" />
                                </div>
                                <h2 className="text-3xl lg:text-4xl font-black text-red-600 dark:text-red-500 mb-2 lg:mb-3">Tótem Bloqueado</h2>
                                <p className="text-base lg:text-xl text-slate-600 dark:text-slate-300 mb-6 lg:mb-8">El sistema detectó una salida no autorizada de Pantalla Completa. Ingrese la clave maestra para reactivar el Tótem.</p>
                                
                                <input 
                                    type="password" autoFocus placeholder="••••••"
                                    value={passwordInput} 
                                    onChange={e => {setPasswordInput(e.target.value); setPasswordError(false)}} 
                                    onKeyDown={e => e.key === 'Enter' && handlePasswordSubmit()}
                                    className={`w-full border-[3px] rounded-xl px-4 py-3 lg:px-5 lg:py-4 text-center text-2xl lg:text-3xl tracking-widest outline-none mb-3 transition-colors dark:bg-slate-800 dark:text-white ${passwordError ? 'border-red-400 bg-red-50' : 'border-slate-300 focus:border-red-500'}`}
                                />
                                {passwordError && <div className="text-red-600 font-bold mb-4 lg:mb-5 text-base lg:text-lg">Clave incorrecta. Intente nuevamente.</div>}
                                
                                <button onClick={handlePasswordSubmit} className="w-full bg-red-600 text-white rounded-xl py-3 lg:py-4 font-black text-lg lg:text-xl hover:bg-red-700 transition-colors shadow-lg">
                                    Desbloquear Pantalla
                                </button>
                            </div>
                        </div>
                    )}

                    {showPasswordModal && !kioskLocked && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center animate-fade-in px-4">
                            <div className="bg-white dark:bg-duoc-card p-8 lg:p-10 rounded-[2rem] shadow-2xl max-w-sm w-full relative border dark:border-slate-700">
                                <button onClick={() => {setShowPasswordModal(false); setPasswordInput(''); setPasswordError(false);}} className="absolute top-4 right-4 lg:top-6 lg:right-6 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors bg-slate-100 dark:bg-slate-800 p-2 rounded-full">
                                    <Icons.X cls="w-5 h-5 lg:w-6 lg:h-6"/>
                                </button>
                                <div className="w-14 h-14 lg:w-16 lg:h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4 lg:mb-5 mx-auto">
                                    <Icons.Lock cls="w-6 h-6 lg:w-8 lg:h-8 text-duoc-blue dark:text-duoc-yellow" />
                                </div>
                                <h3 className="text-xl lg:text-2xl font-black text-center text-duoc-blue dark:text-white mb-2">Acceso Restringido</h3>
                                <p className="text-slate-500 dark:text-slate-400 text-center mb-5 lg:mb-6 text-sm lg:text-base">Ingresa la clave maestra para continuar.</p>
                                
                                <input 
                                    type="password" autoFocus placeholder="••••••"
                                    value={passwordInput} 
                                    onChange={e => {setPasswordInput(e.target.value); setPasswordError(false)}} 
                                    onKeyDown={e => e.key === 'Enter' && handlePasswordSubmit()}
                                    className={`w-full border-[3px] rounded-xl px-4 py-3 text-center text-xl lg:text-2xl tracking-widest outline-none mb-2 transition-colors dark:bg-slate-800 dark:text-white ${passwordError ? 'border-red-400 bg-red-50 dark:bg-red-900/20' : 'border-slate-200 dark:border-slate-600 focus:border-duoc-lightblue dark:focus:border-duoc-yellow'}`}
                                />
                                <div className="h-5 lg:h-6 mb-2 lg:mb-3 text-center">
                                    {passwordError && <span className="text-red-500 dark:text-red-400 text-xs lg:text-sm font-bold">Clave incorrecta</span>}
                                </div>
                                
                                <button onClick={handlePasswordSubmit} className="w-full bg-duoc-blue dark:bg-duoc-yellow text-white dark:text-duoc-blue rounded-xl py-3 lg:py-3.5 font-bold text-base lg:text-lg hover:bg-[#004080] dark:hover:bg-yellow-400 transition-colors shadow-md">
                                    Confirmar
                                </button>
                            </div>
                        </div>
                    )}

                    {/* FOOTER NAVEGACIÓN */}
                    <footer className="bg-white dark:bg-duoc-card border-t border-slate-200 dark:border-slate-800 px-3 py-3 lg:px-8 lg:py-4 shrink-0 flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10 transition-colors duration-300 w-full gap-2">
                        
                        {/* TOGGLE MODO OSCURO (DESKTOP ONLY) */}
                        <div className="hidden lg:flex items-center shrink-0">
                            <button type="button" className="flex items-center gap-3 bg-slate-100 dark:bg-slate-800 px-4 py-2.5 rounded-full border border-slate-200 dark:border-slate-700 transition-colors shadow-inner cursor-pointer" onClick={(e) => { e.preventDefault(); setIsDarkMode(prev => { logEvento('modo_oscuro', {activo: !prev}); return !prev; }); trackAction('buttons'); }}>
                                <Icons.Sun cls={`w-5 h-5 transition-colors ${!isDarkMode ? 'text-duoc-yellow' : 'text-slate-400'}`} />
                                <div className={`relative inline-flex h-7 w-12 items-center rounded-full transition-colors duration-300 focus:outline-none shadow-sm ${isDarkMode ? 'bg-duoc-yellow' : 'bg-slate-300'}`}>
                                    <span className={`inline-block h-5 w-5 transform rounded-full bg-white shadow-md transition-transform duration-300 ease-in-out ${isDarkMode ? 'translate-x-6' : 'translate-x-1'}`} />
                                </div>
                                <Icons.Moon cls={`w-4 h-4 transition-colors ${isDarkMode ? 'text-duoc-yellow' : 'text-slate-400'}`} />
                            </button>
                        </div>
                        
                        {/* CONTENEDOR BOTONES DERECHA */}
                        <div className="flex items-center justify-center lg:justify-end gap-2 lg:gap-4 overflow-x-auto custom-scrollbar flex-nowrap flex-1 min-w-0 py-1">
                            {/* BOTONES PÚBLICOS */}
                            {activeTab === 'CARTELERA' && (
                                <>
                                    {/* Botón QR Integrado */}
                                    <button 
                                        onClick={() => { setShowQrModal(true); trackAction('buttons'); logEvento('qr_abrir'); }}
                                        className="hidden lg:flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg hover:bg-slate-50 transition-colors shadow-sm whitespace-nowrap"
                                        title="Llevar en Celular"
                                    >
                                        <Icons.QrCode cls="w-4 h-4 lg:w-5 lg:h-5" /> <span className="hidden lg:inline">Versión Móvil</span>
                                    </button>

                                    {/* Botón Encuesta Integrado */}
                                    <button 
                                        onClick={() => { setShowSurveyModal(true); trackAction('buttons'); logEvento('encuesta_abrir'); }}
                                        className="flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 bg-duoc-yellow text-duoc-blue rounded-lg lg:rounded-xl font-black text-sm lg:text-lg hover:bg-yellow-400 transition-colors shadow-md whitespace-nowrap"
                                        title="Evalúanos"
                                    >
                                        <Icons.Star cls="w-4 h-4 lg:w-5 lg:h-5" fill="currentColor" /> ¡Evalúanos!
                                    </button>

                                    {/* Botón Exportar App */}
                                    <button 
                                        onClick={() => { handleExportInteractiveTotem(); trackAction('buttons'); }}
                                        className="hidden lg:flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 bg-duoc-lightblue/10 dark:bg-slate-800 text-duoc-lightblue dark:text-slate-300 border border-transparent dark:border-slate-700 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg hover:bg-duoc-lightblue/20 dark:hover:text-white transition-colors shadow-sm whitespace-nowrap"
                                        title="Descargar Tótem Interactivo"
                                    >
                                        <Icons.Download cls="w-4 h-4 lg:w-5 lg:h-5" /> Exportar App
                                    </button>
                                </>
                            )}

                            {/* PANTALLA COMPLETA */}
                            <button 
                                onClick={() => { logEvento('pantalla_completa', {accion: document.fullscreenElement ? 'salir' : 'entrar'}); openSecurityModal(document.fullscreenElement ? 'FULLSCREEN_EXIT' : 'FULLSCREEN_ENTER'); trackAction('buttons'); }}
                                className="hidden lg:flex items-center justify-center p-2 lg:p-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:text-white rounded-lg lg:rounded-xl transition-colors shadow-sm border border-transparent dark:border-slate-700 shrink-0"
                                title="Pantalla Completa Segura"
                            >
                                <Icons.Fullscreen cls="w-4 h-4 lg:w-5 lg:h-5" />
                            </button>
                            
                            {/* BOTON DE ADMIN / VOLVER */}
                            {activeTab === 'CARTELERA' ? (
                                <button onClick={() => { openSecurityModal('ADMIN'); trackAction('buttons'); }} className="hidden lg:flex items-center gap-1.5 lg:gap-2 px-3 py-2 lg:px-5 lg:py-3 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg transition-all border bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-transparent dark:border-slate-700 hover:bg-slate-200 dark:hover:text-white shadow-sm whitespace-nowrap">
                                    <Icons.Settings cls="w-4 h-4 lg:w-5 lg:h-5" /> Admin
                                </button>
                            ) : (
                                <button onClick={() => { setActiveTab('CARTELERA'); setAdminSubTab('DASHBOARD'); trackAction('buttons'); }} className="flex items-center gap-1.5 lg:gap-2 px-4 py-2 lg:px-6 lg:py-3 rounded-lg lg:rounded-xl font-bold text-sm lg:text-lg transition-all border bg-duoc-blue dark:bg-slate-800 text-white dark:text-duoc-yellow border-transparent dark:border-slate-700 shadow-md hover:bg-[#004080] dark:hover:bg-slate-700 whitespace-nowrap">
                                    <Icons.LayoutList cls="w-4 h-4 lg:w-5 lg:h-5" /> Vista Estudiantes
                                </button>
                            )}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
</script>
</body>
</html>
